<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resimli Kelime Tamamlama</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #00d2d3;
            --primary: #6c5ce7;
            --hint: #ff9f43;
        }

        * { box-sizing: border-box; touch-action: none; font-family: 'Arial Rounded MT Bold', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        #game-container {
            width: 92%; max-width: 420px; background: var(--card);
            padding: 25px; border-radius: 45px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .header { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--primary); font-weight: bold; margin-bottom: 10px; }

        .target-word { font-size: 3.2rem; font-weight: 900; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .instruction { font-size: 1rem; color: #94a3b8; margin: 10px 0 20px 0; font-weight: bold; }

        /* OYUN ALANI DÜZENİ (YAN YANA) */
        .game-row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: nowrap;
        }

        /* ÇİZİM KUTUSU (İLK KUTU) */
        .canvas-box {
            background: #fff;
            border: 4px solid var(--primary);
            border-radius: 20px;
            width: 120px; /* Diğer kutulardan biraz daha geniş */
            height: 100px;
            position: relative;
            flex-shrink: 0;
        }
        canvas { width: 100%; height: 100%; border-radius: 16px; cursor: crosshair; }

        /* HARF KUTULARI */
        .letter-box {
            background: #fff;
            width: 70px;
            height: 90px; /* Çizim kutusuyla dengeli durması için */
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 0 #cbd5e1;
            flex-shrink: 0;
        }

        .letter-box input {
            width: 80%; border: none; border-bottom: 3px solid var(--primary);
            text-align: center; font-size: 2rem; font-weight: bold;
            color: #2d3436; outline: none; background: transparent;
        }

        .box-label { font-size: 0.6rem; color: #636e72; margin-top: 5px; font-weight: bold; }

        .btn-check {
            width: 100%; padding: 20px; background: var(--primary); color: white;
            border: none; border-radius: 22px; font-size: 1.5rem; font-weight: 900;
            cursor: pointer; box-shadow: 0 8px 0 #4834d4;
        }

        .hint-btn {
            margin-top: 15px; background: rgba(255,159,67,0.1);
            border: 1px dashed var(--hint); padding: 10px; border-radius: 15px;
            color: var(--hint); font-size: 0.8rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        #ad-view {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header"><span>KOLAY</span><span>∞</span></div>

    <div class="target-word" id="target">ELMA</div>
    <div class="instruction">Resmi çiz, harflerle tamamla!</div>

    <!-- TÜM PARÇALAR YAN YANA -->
    <div class="game-row" id="game-row">
        <!-- Buraya dinamik olarak çizim alanı ve inputlar gelecek -->
    </div>

    <button class="btn-check" onclick="check()">KONTROL ET</button>

    <div class="hint-btn" onclick="playAd()">📺 Reklam İzle & İpucu Al</div>
    <p style="color:#64748b; font-size:0.7rem; margin-top:15px; cursor:pointer;" onclick="clearDraw()">Çizimi Temizle</p>
</div>

<div id="ad-view">
    <div style="border:4px solid var(--accent); border-top:4px solid transparent; width:40px; height:40px; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p>Reklam İzleniyor... (<span id="ad-sec">3</span>)</p>
</div>

<script>
    // ANA KURGU VERİSİ
    // word: Tam kelime, drawPart: Çizilmesi gereken kısım, letters: Kalan harfler
    const levels = [
        { word: "ELMA", drawPart: "EL", letters: ["M", "A"] },
        { word: "ARABA", drawPart: "ARI", letters: ["B", "A"] }, // Arı(çiz) + B + A = Araba (burada harflere göre kurgu değişebilir)
        { word: "KUMBARA", drawPart: "KUM", letters: ["B", "A", "R", "A"] }
    ];

    let current = 0;
    let isDrawing = false;

    function init() {
        const data = levels[current];
        const row = document.getElementById('game-row');
        document.getElementById('target').innerText = data.word;
        row.innerHTML = '';

        // 1. Çizim Kutusu (Sol Başta)
        const cBox = document.createElement('div');
        cBox.className = 'canvas-box';
        cBox.innerHTML = `<canvas id="cvs"></canvas><div style="position:absolute; bottom:5px; width:100%; font-size:8px; color:#ccc;">"${data.drawPart}" ÇİZ</div>`;
        row.appendChild(cBox);

        // 2. Harf Kutuları (Yan Yana)
        data.letters.forEach((char, i) => {
            const lBox = document.createElement('div');
            lBox.className = 'letter-box';
            lBox.innerHTML = `<input type="text" id="L${i}" maxlength="1" autocomplete="off"><span class="box-label">HARF</span>`;
            row.appendChild(lBox);
        });

        setupCanvas();
    }

    function setupCanvas() {
        const c = document.getElementById('cvs');
        const ctx = c.getContext('2d');
        c.width = c.offsetWidth; c.height = c.offsetHeight;
        ctx.strokeStyle = "#2d3436"; ctx.lineWidth = 4; ctx.lineCap = "round";

        const pos = (e) => {
            const r = c.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
            return {x, y};
        };

        c.onmousedown = c.ontouchstart = (e) => { isDrawing = true; ctx.beginPath(); const p = pos(e); ctx.moveTo(p.x, p.y); if(e.cancelable) e.preventDefault(); };
        c.onmousemove = c.ontouchmove = (e) => { if(!isDrawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        window.onmouseup = window.ontouchend = () => isDrawing = false;
    }

    function playAd() {
        const ad = document.getElementById('ad-view');
        ad.style.display = 'flex';
        let count = 3;
        const t = setInterval(() => {
            count--; document.getElementById('ad-sec').innerText = count;
            if(count <= 0) { clearInterval(t); ad.style.display = 'none'; getHint(); }
        }, 1000);
    }

    function getHint() {
        const data = levels[current];
        for(let i=0; i<data.letters.length; i++) {
            const input = document.getElementById(`L${i}`);
            if(input.value.toUpperCase() !== data.letters[i]) {
                input.value = data.letters[i];
                input.style.color = "var(--hint)";
                break;
            }
        }
    }

    function clearDraw() { 
        const c = document.getElementById('cvs');
        c.getContext('2d').clearRect(0,0,c.width,c.height); 
    }

    function check() {
        const data = levels[current];
        let win = true;
        data.letters.forEach((char, i) => {
            if(document.getElementById(`L${i}`).value.toUpperCase() !== char) win = false;
        });

        if(win) {
            alert("Tebrikler! Kelimeyi tamamladın.");
            current = (current + 1) % levels.length;
            init();
        } else {
            alert("Harfler hatalı!");
        }
    }

    init();
</script>
<style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
